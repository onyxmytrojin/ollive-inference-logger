apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ollive
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ollive-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              valueFrom: { configMapKeyRef: { name: ollive-config, key: VITE_API_BASE_URL } }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ollive
spec:
  type: ClusterIP
  selector: { app: frontend }
  ports:
    - port: 5173
      targetPort: 5173
