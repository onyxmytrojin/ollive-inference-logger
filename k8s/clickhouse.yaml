apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: ollive
data:
  listen.xml: |
    <clickhouse>
        <listen_host replace="1">0.0.0.0</listen_host>
    </clickhouse>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-pvc
  namespace: ollive
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: ollive
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: clickhouse }
  template:
    metadata:
      labels: { app: clickhouse }
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8-alpine
          ports:
            - containerPort: 8123
            - containerPort: 9000
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom: { secretKeyRef: { name: ollive-secrets, key: CLICKHOUSE_PASSWORD } }
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/listen.xml
              subPath: listen.xml
          readinessProbe:
            httpGet: { path: /ping, port: 8123 }
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: clickhouse-pvc }
        - name: config
          configMap: { name: clickhouse-config }
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: ollive
spec:
  selector: { app: clickhouse }
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
