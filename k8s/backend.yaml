apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ollive
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ollive-backend:latest
          imagePullPolicy: IfNotPresent
          args: ["web"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: ollive-config }
            - secretRef: { name: ollive-secrets }
          readinessProbe:
            httpGet: { path: /health/, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ollive
spec:
  type: LoadBalancer
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
