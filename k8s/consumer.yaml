apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: ollive
spec:
  replicas: 1
  selector:
    matchLabels: { app: consumer }
  template:
    metadata:
      labels: { app: consumer }
    spec:
      containers:
        - name: consumer
          image: ollive-backend:latest
          imagePullPolicy: IfNotPresent
          args: ["worker"]
          envFrom:
            - configMapRef: { name: ollive-config }
            - secretRef: { name: ollive-secrets }
